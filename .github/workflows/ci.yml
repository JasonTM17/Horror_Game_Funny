# Lightweight non-Docker CI: packaging contracts without the full container suite.
# Full twelve-check container run remains in docker-suite.yml.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  packaging-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify Docker packaging contracts
        run: bash tests/verify-docker-packaging.sh

      - name: Assert professional root docs exist
        run: |
          set -euo pipefail
          for f in SECURITY.md CONTRIBUTING.md .editorconfig LICENSE README.md CHANGELOG.md; do
            test -s "$f" || { echo "missing or empty: $f"; exit 1; }
            echo "OK $f"
          done
          grep -q 'SECURITY.md' README.md
          grep -q 'CONTRIBUTING.md' README.md
          grep -Eiq 'PDR-07|physical|15.?20' README.md
          echo "PRO_DOCS_OK"

  secret-patterns:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Scan for common secret patterns
        run: bash tests/scan-secret-patterns.sh
