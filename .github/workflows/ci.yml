# Lightweight non-Docker CI: packaging, documentation, media, and secret contracts.
# Full twelve-check container run remains in docker-suite.yml.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  packaging-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify Docker packaging contracts
        run: bash tests/verify-docker-packaging.sh

      - name: Verify repository docs and media
        run: python3 tests/verify-repository-docs.py

  secret-patterns:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Scan for common secret patterns
        run: bash tests/scan-secret-patterns.sh
