name: docker-suite

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  packaging-and-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify Docker packaging contracts
        run: bash tests/verify-docker-packaging.sh

      - name: Build suite image
        run: docker compose build suite

      - name: Run twelve headless checks in container
        run: docker compose run --rm suite

      - name: Publish to Docker Hub (main only, when secrets present)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${DOCKERHUB_USERNAME:-}" || -z "${DOCKERHUB_TOKEN:-}" ]]; then
            echo "Docker Hub publish skipped: repository secrets are not configured."
            echo "Configure repository secrets DOCKERHUB_USERNAME (nguyenson1710) and DOCKERHUB_TOKEN at"
            echo "https://github.com/${GITHUB_REPOSITORY}/settings/secrets/actions"
            exit 0
          fi
          if [[ "$DOCKERHUB_USERNAME" != "nguyenson1710" ]]; then
            echo "DOCKERHUB_USERNAME must be nguyenson1710 (got: $DOCKERHUB_USERNAME)" >&2
            exit 1
          fi
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          IMAGE="nguyenson1710/horror-game-suite"
          docker tag "${IMAGE}:latest" "${IMAGE}:${GITHUB_SHA}"
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${GITHUB_SHA}"
          echo "Published ${IMAGE}:latest and ${IMAGE}:${GITHUB_SHA}"


  # This separate trusted job is the only job that receives packages: write. Pull
  # requests run the suite but never receive a registry-publishing token.
  ghcr-publish:
    if: >-
      github.repository == 'JasonTM17/Horror_Game_Funny' && github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: packaging-and-suite
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build trusted GHCR suite image
        env:
          # OCI image references are lowercase; the GitHub owner has mixed case.
          GHCR_IMAGE: ghcr.io/jasontm17/horror-game-suite
        run: docker build --tag "${GHCR_IMAGE}:${GITHUB_SHA}" .

      - name: Run twelve checks in the trusted GHCR image
        env:
          GHCR_IMAGE: ghcr.io/jasontm17/horror-game-suite
        run: docker run --rm "${GHCR_IMAGE}:${GITHUB_SHA}"

      - name: Sign in to GitHub Container Registry
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: echo "$GITHUB_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish verified GHCR suite image
        env:
          GHCR_IMAGE: ghcr.io/jasontm17/horror-game-suite
        run: |
          set -euo pipefail
          immutable="${GHCR_IMAGE}:${GITHUB_SHA}"
          docker push "$immutable"
          if [[ "$GITHUB_REF" == 'refs/heads/main' ]]; then
            docker tag "$immutable" "${GHCR_IMAGE}:latest"
            docker push "${GHCR_IMAGE}:latest"
            echo "Published ${immutable} and ${GHCR_IMAGE}:latest"
          else
            docker tag "$immutable" "${GHCR_IMAGE}:${GITHUB_REF_NAME}"
            docker push "${GHCR_IMAGE}:${GITHUB_REF_NAME}"
            echo "Published ${immutable} and ${GHCR_IMAGE}:${GITHUB_REF_NAME}"
          fi
